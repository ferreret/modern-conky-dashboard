--[[
  Modern Conky Dashboard
  Full-screen transparent overlay with Cairo rendering
]]

local function screen_res()
    local f = io.popen("xdpyinfo 2>/dev/null | grep dimensions | awk '{print $2}'")
    local r = f and f:read("*l") or "1920x1080"
    if f then f:close() end
    local w, h = r:match("(%d+)x(%d+)")
    return tonumber(w) or 1920, tonumber(h) or 1080
end

local sw, sh = screen_res()
local dir = debug.getinfo(1, "S").source:sub(2):match("(.*[/\\])") or "./"

conky.config = {
    -- Window: full-screen transparent overlay
    own_window = true,
    own_window_class = 'ConkyModern',
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    -- Full screen
    alignment = 'top_left',
    gap_x = 0,
    gap_y = 0,
    minimum_width = sw,
    minimum_height = sh,
    maximum_width = sw,

    -- Rendering
    double_buffer = true,
    update_interval = 0.2,  -- Fast for smooth visualizer, processes cached at 2s
    cpu_avg_samples = 4,
    net_avg_samples = 4,
    no_buffers = true,

    -- Cairo drawing
    lua_load = dir .. 'draw.lua',
    lua_draw_hook_pre = 'main',

    -- Disable text rendering artifacts
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    border_width = 0,
    default_color = 'FFFFFF',

    -- Background
    background = true,
    out_to_console = false,
    out_to_stderr = false,
    use_spacer = 'none',
}

-- Trigger periodic data fetching scripts (output goes to /tmp cache files)
local home = os.getenv("HOME") or "~"
local scripts = home .. "/.config/conky/modern/scripts"

conky.text = [[${execi 1800 ]] .. scripts .. [[/weather.sh 2>/dev/null}${execi 300 ]] .. scripts .. [[/calendar.sh 2>/dev/null}${execi 3 ]] .. scripts .. [[/media.sh 2>/dev/null} ]]
